<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
    <!-- Background rounded square -->
    <rect width="32" height="32" rx="7" fill="#0A0A0A"/>

    <!-- Gem: top-left facet (highlight) -->
    <polygon points="7,13 16,5 12,13" fill="#B09AFF"/>
    <!-- Gem: top-center facet (mid) -->
    <polygon points="16,5 20,13 12,13" fill="#7C5CFF"/>
    <!-- Gem: top-right facet (shadow) -->
    <polygon points="16,5 25,13 20,13" fill="#5840C0"/>

    <!-- Gem: bottom-left facet -->
    <polygon points="7,13 12,13 16,28" fill="#9070FF"/>
    <!-- Gem: bottom-center facet (main) -->
    <polygon points="12,13 20,13 16,28" fill="#7C5CFF"/>
    <!-- Gem: bottom-right facet (shadow) -->
    <polygon points="20,13 25,13 16,28" fill="#4A32A8"/>

    <!-- Thin inner divider lines for facet definition -->
    <line x1="7" y1="13" x2="25" y2="13" stroke="#0A0A0A" stroke-width="0.6" opacity="0.7"/>
    <line x1="16" y1="5" x2="12" y2="13" stroke="#0A0A0A" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="5" x2="20" y2="13" stroke="#0A0A0A" stroke-width="0.5" opacity="0.5"/>
    <line x1="12" y1="13" x2="16" y2="28" stroke="#0A0A0A" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="13" x2="16" y2="28" stroke="#0A0A0A" stroke-width="0.5" opacity="0.5"/>
</svg>
